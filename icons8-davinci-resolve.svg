<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 65 65" fill="none">
  <defs>
    <!-- Spotlight/radial background gradient matching the official macOS DaVinci Resolve icon -->
    <radialGradient id="bgGrad" cx="50%" cy="30%" r="80%" fx="50%" fy="10%">
      <stop offset="0%" stop-color="#1c2c3e" />
      <stop offset="100%" stop-color="#0b111a" />
    </radialGradient>

    <!-- Super-fine, high-accuracy rainbow border gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="35%" stop-color="#7eff3b" />
      <stop offset="70%" stop-color="#ffb000" />
      <stop offset="100%" stop-color="#ff0055" />
    </linearGradient>

    <!-- Soft 3D drop shadow for the color petals -->
    <filter id="petalShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.2" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <!-- Official color petal radial gradients with bright glossy highlights -->
    <radialGradient
       id="radialGradient1680"
       gradientUnits="userSpaceOnUse"
       gradientTransform="matrix(1.058469,0.08930151,-0.16507404,1.9565823,2.7884105,-28.123773)"
       cx="32.135498"
       cy="28.274265"
       fx="32.135498"
       fy="28.274265"
       r="7.0000019">
      <stop style="stop-color:#ffffff;stop-opacity:1" offset="0" />
      <stop style="stop-color:#009bd8;stop-opacity:1" offset="1" />
    </radialGradient>

    <radialGradient
       id="radialGradient2517"
       cx="34.077766"
       cy="33.654915"
       fx="34.077766"
       fy="33.654915"
       r="8.0000048"
       gradientTransform="matrix(1.9033696,0.76036676,-0.40632236,1.0171167,-17.110072,-25.819532)"
       gradientUnits="userSpaceOnUse">
      <stop style="stop-color:#ffffff;stop-opacity:1" offset="0" />
      <stop style="stop-color:#ff3044;stop-opacity:1" offset="1" />
    </radialGradient>

    <radialGradient
       id="radialGradient2852"
       cx="29.661343"
       cy="35.66066"
       fx="29.661343"
       fy="35.66066"
       r="8.0000048"
       gradientTransform="matrix(-1.7236439,1.148614,-0.5221049,-0.78348595,99.579489,27.599128)"
       gradientUnits="userSpaceOnUse">
      <stop style="stop-color:#ffffff;stop-opacity:1" offset="0" />
      <stop style="stop-color:#fcff7c;stop-opacity:1" offset="1" />
    </radialGradient>
  </defs>

  <!-- Outer Dark Border for Bevel Effect -->
  <rect x="2" y="2" width="61" height="61" rx="14.5" fill="none" stroke="#070a0f" stroke-width="1.2" />

  <!-- Background Squircle with Subtle Rainbow Inner Edge -->
  <rect x="2.6" y="2.6" width="59.8" height="59.8" rx="14" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="0.8" />

  <!-- Petals Group with official curves & translations -->
  <g transform="translate(-0.0232537,-44.297248)">
    <g transform="matrix(1.0324977,0,0,1.0324977,-1.0437923,44.339431)">
      
